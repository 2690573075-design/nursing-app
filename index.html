<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>護理協作APP</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

<div class="phone-frame">
  <header class="sticky-header">
    <div class="header-row">
      <h1 class="greeting">👋 Ｈi {護理師名稱}</h1>
      <div class="header-icons">
        <img src="icons/header-icon-camera.svg" alt="camera">
        <img src="icons/header-icon-scan.svg" alt="scan">
        <img src="icons/header-icon-msg.svg" alt="messages">
      </div>
    </div>
    <div class="quick-actions">
      <img src="icons/action-medication.svg" alt="藥品配送">
      <img src="icons/action-specimen.svg" alt="檢體取送">
      <img src="icons/action-education.svg" alt="護理衛教">
      <img src="icons/action-environment.svg" alt="環境介紹">
    </div>
    <div class="section-header">
      <h2 class="section-title">最近的派工</h2>
      <a href="#" class="view-all">查看全部</a>
    </div>
  </header>

  <div class="scroll-content">
    <div class="task-list">
      <object class="task-img" data="icons/task-completed-component.svg" type="image/svg+xml" aria-label="藥品任務"></object>
      <object class="task-img" data="icons/task-aborted-component.svg" type="image/svg+xml" aria-label="藥品任務"></object>
      <object class="task-img task-divider" data="icons/divider-frame.svg" type="image/svg+xml" aria-label=""></object>
      <object class="task-img" data="icons/task-active.svg" type="image/svg+xml" aria-label="正在領取藥品"></object>
      <object class="task-img" data="icons/task-specimen.svg" type="image/svg+xml" aria-label="檢體取送"></object>
      <object class="task-img" data="icons/task-pending1.svg" type="image/svg+xml" aria-label="藥品配送"></object>
      <object class="task-img" data="icons/task-pending2.svg" type="image/svg+xml" aria-label="藥品配送"></object>
    </div>
  </div>

  <nav class="bottom-nav">
    <img src="icons/bottom-nav.svg" alt="navigation">
  </nav>
</div>

<script>
(function() {
  var scrollEl = document.querySelector('.scroll-content');
  var headerEl = document.querySelector('.sticky-header');
  if (!scrollEl || !headerEl) return;
  scrollEl.addEventListener('scroll', function() {
    if (scrollEl.scrollTop > 0) {
      headerEl.classList.add('scrolled');
    } else {
      headerEl.classList.remove('scrolled');
    }
  });
})();
</script>
</body>
</html>
